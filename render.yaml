services:
  - type: web
    name: stockadvisor-backend
    runtime: python
    repo: https://github.com/luoxiaoliangTj/Py_Learning
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
    plan: free
    autoDeploy: true
